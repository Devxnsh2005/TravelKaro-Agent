<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelKaro - AI-Powered Travel Planning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .glow-text {
            text-shadow: 0 0 10px rgba(79, 192, 210, 0.7);
        }
        .btn-glow {
            box-shadow: 0 0 15px rgba(79, 192, 210, 0.7);
            transition: all 0.3s ease;
        }
        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(79, 192, 210, 0.9);
            transform: translateY(-2px);
        }
        .ai-highlight {
            background: linear-gradient(90deg, #4fc0d2, #a162e8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 600;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
  <!-- Instructional Text and Arrow -->
<div class="absolute top-4 left-4 bg-white/90 text-gray-800 rounded px-3 py-2 shadow text-sm font-medium animate-bounce z-50">
    ⬆️ Allow Microphone permissions to talk to AI
</div>

    <div class="text-center max-w-2xl mx-auto">
        <h1 class="text-5xl md:text-6xl font-bold text-gray-800 mb-4 glow-text">TravelKaro</h1>
        
        <div class="mb-8">
            <p class="text-xl md:text-2xl text-gray-600 mb-2">Making your travel decisions simple</p>
            <p class="text-2xl md:text-3xl font-medium ai-highlight">WITH AI</p>
        </div>
        
        <button id="planButton" class="btn-glow bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold py-4 px-8 rounded-full text-lg md:text-xl">
            Let's plan your vacations
        </button>
        
        <div class="mt-12 text-gray-500 text-sm">
            <p>Powered by AI travel assistant technology</p>
        </div>
    </div>

    <script>
        document.getElementById('planButton').addEventListener('click', function() {
            // Initialize Vapi AI when button is clicked
            var vapiInstance = null;
            const assistant = "524ce888-1fdd-4cf7-a0e2-a7bbaab721b2";
            const apiKey = "adcc4dc0-2e7c-4b2c-ab26-9b9b09a6d1fd";
            const buttonConfig = {};
            
            (function (d, t) {
                var g = document.createElement(t),
                    s = d.getElementsByTagName(t)[0];
                g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
                g.defer = true;
                g.async = true;
                s.parentNode.insertBefore(g, s);
                
                g.onload = function () {
                    vapiInstance = window.vapiSDK.run({
                        apiKey: apiKey,
                        assistant: assistant,
                        config: buttonConfig,
                    });
                    
                    vapiInstance.on('call-ended', (e) => {
                        if (e.type === 'hangup') {
                            confetti({
                                particleCount: 100,
                                spread: 70,
                                origin: { y: 0.6 },
                                colors: ['#4fc0d2', '#a162e8', '#ff6b6b', '#ffd166']
                            });
                        }
                    });
                };
            })(document, "script");
            
            // Button feedback
            this.classList.add('animate-pulse');
            setTimeout(() => {
                this.classList.remove('animate-pulse');
            }, 500);
        });
    </script>
</body>
</html>
